name: Build Windows Installer

on:
  push:
    branches: [main]
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: build-windows-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-windows:
    runs-on: windows-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests
        run: npm test

      - name: Build Windows installer (.exe)
        run: npx electron-builder --win --publish never

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: cs2-ultimate-optimizer-windows
          path: |
            build/*.exe
          if-no-files-found: error
          retention-days: 30

      - name: Update README with latest build link
        if: success() && github.event_name != 'pull_request'
        shell: node {0}
        env:
          SERVER_URL: ${{ github.server_url }}
          REPO: ${{ github.repository }}
          RUN_ID: ${{ github.run_id }}
          SHA: ${{ github.sha }}
        run: |
          const fs = require('fs');
          const readmePath = 'README.md';
          let content = fs.readFileSync(readmePath, 'utf8');
          const shortSha = process.env.SHA.slice(0, 7);
          const commitUrl = `${process.env.SERVER_URL}/${process.env.REPO}/commit/${process.env.SHA}`;
          const runUrl = `${process.env.SERVER_URL}/${process.env.REPO}/actions/runs/${process.env.RUN_ID}`;
          const now = new Date().toISOString().replace('T', ' ').slice(0, 19) + ' UTC';
          const block = [
            '<!-- LATEST_BUILD_START -->',
            `> 📦 **Último build:** [\`${shortSha}\`](${commitUrl}) — gerado em ${now}`,
            '>',
            `> 👉 [Abrir o run e baixar o instalador em "Artifacts"](${runUrl})`,
            '<!-- LATEST_BUILD_END -->',
          ].join('\n');
          const regex = /<!-- LATEST_BUILD_START -->[\s\S]*?<!-- LATEST_BUILD_END -->/;
          if (!regex.test(content)) {
            console.log('Marcadores LATEST_BUILD não encontrados no README — pulando atualização.');
            process.exit(0);
          }
          const updated = content.replace(regex, block);
          if (updated === content) {
            console.log('README já está atualizado, nada a fazer.');
            process.exit(0);
          }
          fs.writeFileSync(readmePath, updated);
          console.log('README atualizado com o link do último build.');

      - name: Commit README update
        if: success() && github.event_name != 'pull_request'
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md
          if git diff --cached --quiet; then
            echo "Nenhuma alteração no README para commitar."
          else
            git commit -m "docs: atualiza link do ultimo build [skip ci]"
            git pull --rebase origin "${GITHUB_REF_NAME}"
            git push origin "HEAD:${GITHUB_REF_NAME}"
          fi
        continue-on-error: true

      - name: Update Discord build dashboard & alert on failure
        if: always()
        shell: node {0}
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          JOB_STATUS: ${{ job.status }}
        run: |
          require('./.github/scripts/discord-dashboard.js');

      - name: Commit dashboard message id (if changed)
        if: always()
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .github/discord-dashboard-message-id.txt 2>/dev/null || true
          if git diff --cached --quiet 2>/dev/null; then
            echo "Nenhuma alteração no id da mensagem do dashboard."
          else
            git commit -m "chore: atualiza id da mensagem do dashboard Discord [skip ci]"
            git pull --rebase origin "${GITHUB_REF_NAME}"
            git push origin "HEAD:${GITHUB_REF_NAME}"
          fi
        continue-on-error: true
