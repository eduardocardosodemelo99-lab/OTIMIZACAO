name: Build Windows Installer

on:
  push:
    branches: [main]
  workflow_dispatch: {}

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build Windows installer (.exe)
        run: npx electron-builder --win --publish never

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: cs2-ultimate-optimizer-windows
          path: |
            build/*.exe
          if-no-files-found: error
          retention-days: 30

      - name: Notify Discord (success)
        if: success()
        shell: node {0}
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          REPO: ${{ github.repository }}
          SHA: ${{ github.sha }}
          REF_NAME: ${{ github.ref_name }}
          ACTOR: ${{ github.actor }}
          SERVER_URL: ${{ github.server_url }}
          RUN_ID: ${{ github.run_id }}
        run: |
          const https = require('https');
          const { URL } = require('url');
          const shortSha = process.env.SHA.slice(0, 7);
          const commitUrl = `${process.env.SERVER_URL}/${process.env.REPO}/commit/${process.env.SHA}`;
          const runUrl = `${process.env.SERVER_URL}/${process.env.REPO}/actions/runs/${process.env.RUN_ID}`;
          const payload = JSON.stringify({
            embeds: [{
              title: '✅ Build concluído com sucesso',
              description: `Repositório: ${process.env.REPO}\nCommit: [\`${shortSha}\`](${commitUrl})\nBranch: ${process.env.REF_NAME}\nAutor: ${process.env.ACTOR}\n[Ver run](${runUrl})`,
              color: 3066993
            }]
          });
          const url = new URL(process.env.DISCORD_WEBHOOK_URL);
          const req = https.request(url, { method: 'POST', headers: { 'Content-Type': 'application/json', 'Content-Length': Buffer.byteLength(payload) } }, (res) => {
            console.log('Discord response status:', res.statusCode);
            res.on('data', (d) => process.stdout.write(d));
          });
          req.on('error', (e) => { console.error('Discord notify failed:', e); process.exit(1); });
          req.write(payload);
          req.end();

      - name: Notify Discord (failure)
        if: failure()
        shell: node {0}
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          REPO: ${{ github.repository }}
          SHA: ${{ github.sha }}
          REF_NAME: ${{ github.ref_name }}
          ACTOR: ${{ github.actor }}
          SERVER_URL: ${{ github.server_url }}
          RUN_ID: ${{ github.run_id }}
        run: |
          const https = require('https');
          const { URL } = require('url');
          const shortSha = process.env.SHA.slice(0, 7);
          const commitUrl = `${process.env.SERVER_URL}/${process.env.REPO}/commit/${process.env.SHA}`;
          const runUrl = `${process.env.SERVER_URL}/${process.env.REPO}/actions/runs/${process.env.RUN_ID}`;
          const payload = JSON.stringify({
            embeds: [{
              title: '❌ Build falhou',
              description: `Repositório: ${process.env.REPO}\nCommit: [\`${shortSha}\`](${commitUrl})\nBranch: ${process.env.REF_NAME}\nAutor: ${process.env.ACTOR}\n[Ver run](${runUrl})`,
              color: 15158332
            }]
          });
          const url = new URL(process.env.DISCORD_WEBHOOK_URL);
          const req = https.request(url, { method: 'POST', headers: { 'Content-Type': 'application/json', 'Content-Length': Buffer.byteLength(payload) } }, (res) => {
            console.log('Discord response status:', res.statusCode);
            res.on('data', (d) => process.stdout.write(d));
          });
          req.on('error', (e) => { console.error('Discord notify failed:', e); process.exit(1); });
          req.write(payload);
          req.end();
