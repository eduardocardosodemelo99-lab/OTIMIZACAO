name: Build Windows Installer

on:
  push:
    branches: [main]
  workflow_dispatch: {}

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build Windows installer (.exe)
        run: npx electron-builder --win --publish never

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: cs2-ultimate-optimizer-windows
          path: |
            build/*.exe
          if-no-files-found: error
          retention-days: 30

      - name: Notify Discord (success)
        if: success()
        shell: bash
        run: |
          curl -s -H "Content-Type: application/json" -X POST \
            -d "{\"embeds\":[{\"title\":\"✅ Build concluído com sucesso\",\"description\":\"Repositório: ${{ github.repository }}\\nCommit: [\`${{ github.sha }}\`](${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }})\\nBranch: ${{ github.ref_name }}\\nAutor: ${{ github.actor }}\\n[Ver run](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})\",\"color\":3066993}]}" \
            "${{ secrets.DISCORD_WEBHOOK_URL }}"

      - name: Notify Discord (failure)
        if: failure()
        shell: bash
        run: |
          curl -s -H "Content-Type: application/json" -X POST \
            -d "{\"embeds\":[{\"title\":\"❌ Build falhou\",\"description\":\"Repositório: ${{ github.repository }}\\nCommit: [\`${{ github.sha }}\`](${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }})\\nBranch: ${{ github.ref_name }}\\nAutor: ${{ github.actor }}\\n[Ver run](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})\",\"color\":15158332}]}" \
            "${{ secrets.DISCORD_WEBHOOK_URL }}"
